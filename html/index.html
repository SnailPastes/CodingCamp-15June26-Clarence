<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/index.css">
    <script type="module" src="../js/index.js"></script>
</head>

<body>
    <button id="themeToggle" class="smallBtn" aria-label="Toggle dark mode">🌙 Dark</button>

    <div id="greetingDiv">
        <h1 id="timeH1"></h1>
        <h3 id="dateH3"></h3>
        <h2 id="greeting">Good Morning</h2>

        <div>
            <input type="text" name="" id="nameField" placeholder="Your Name">
            <button id="nameBtn" class="bigBtn">Change Name</button>
        </div>
    </div>

    <div class="superDiv">
        <div class="headDiv">
            <h2>Focus Timer</h2>
            <h1 id="timer"></h1>
            <div>
                <input type="number" name="" id="timerNumber" value="25">
                <button id="startTimer" class="bigBtn">Start</button>
                <button id="stopTimer" class="smallBtn">Stop</button>
                <button id="resetTimer" class="smallBtn">Reset</button>
            </div>
        </div>

        <div class="headDiv">
            <h2>Tasks</h2>
            <div>
                <input type="text" name="" id="taskField" placeholder="Add new task">
                <button id="addTask" class="bigBtn">Add</button>
            </div>

            <div id="taskDiv">

            </div>
        </div>

    </div>

    <div class="superDiv">
        <div class="headDiv">
            <div>
                <h2>Quick Links</h2>
                <div>
                    <input type="text" name="" id="linkField" placeholder="Link name">
                    <input type="text" name="" id="urlField" placeholder="URL">
                    <button id="linkBtn" class="bigBtn">Add Link</button>
                </div>

                <div id="linkDiv">

                </div>
            </div>
        </div>

    </div>
</body>

</html>
